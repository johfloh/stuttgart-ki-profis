# ============================================================
# Handwerker-KI Preisliste (Preisliste / Price Table)
# ============================================================
# Jeder Handwerker bekommt seine eigene Preisliste.
# Der Agent matched eingehende Anfragen automatisch auf diese Preise.
# ============================================================

# Standard-Stundensatz (Fallback fuer nicht gelistete Arbeiten)
hourly_rate: 55.00

# Materialaufschlag (z.B. 1.15 = 15% auf Materialpreis)
materials_markup: 1.15

# Standard-Services mit festen Preisen
# format: beschreibung, price, unit (h=Stunde, qm=Quadratmeter, Stk=Stueck, m=Meter, pauschal=Pauschale)
standard_services:
  # ── Arbeit / Stunden ──
  - description: "Arbeitsstunde (Standard)"
    price: 55.00
    unit: "h"
  - description: "Arbeitsstunde (Samstag)"
    price: 75.00
    unit: "h"
  - description: "Notdienst / Soforteinsatz"
    price: 95.00
    unit: "h"

  # ── Anfahrt / Pauschalen ──
  - description: "Anfahrt pauschal (Stadtgebiet)"
    price: 35.00
    unit: "pauschal"
  - description: "Anfahrt pauschal (Umland)"
    price: 50.00
    unit: "pauschal"
  - description: "Kleinmaterialpauschale"
    price: 25.00
    unit: "pauschal"

  # ── Beispiel: Elektriker ──
